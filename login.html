<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Judul bawaan dibikin netral, tidak ada jejak iMersWAstore -->
    <title>Masuk - Panel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <script>
        try {
            if (localStorage.getItem('iMersWA_User')) {
                if (window.location.protocol !== 'blob:' && window.location.protocol !== 'data:' && window.self === window.top) {
                    window.location.href = 'dashboard.html';
                }
            }
        } catch (e) { 
            console.error("Error cek sesi:", e); 
        }
    </script>

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden relative">
        
        <a id="backBtn" href="index.html" onclick="window.location.href='index.html'; return false;" class="absolute top-4 left-4 text-slate-400 hover:text-slate-600 flex items-center gap-1 text-sm font-medium transition-colors cursor-pointer z-10">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> <span id="backBtnText">Beranda</span>
        </a>

        <div class="p-8 pt-12">
            <div class="text-center mb-8">
                <!-- LOGO DEFAULT DIGANTI JADI LOGO JUALANPLUS -->
                <div id="brandLogoContainer" class="w-12 h-12 rounded-xl bg-white border border-slate-200 flex items-center justify-center mx-auto mb-4 overflow-hidden">
                    <img src="https://imersnesia.com/wp-content/uploads/2026/06/iconjualanplus.png" class="w-full h-full object-cover" alt="Logo">
                </div>
                <h2 class="text-2xl font-bold text-slate-900" id="formTitle">Masuk ke JualanPlus</h2>
                <p class="text-slate-500 text-sm mt-1" id="formSubtitle">Silakan masuk ke panel admin Anda</p>
            </div>

            <div id="alertBox" class="hidden mb-6 p-3 rounded-lg text-sm font-medium text-center"></div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="Masukkan username Anda">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-medium text-slate-700">Password</label>
                        <button type="button" onclick="toggleForm('forgot')" class="text-xs text-emerald-600 hover:text-emerald-700 font-medium transition-colors">Lupa password?</button>
                    </div>
                    <input type="password" id="password" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="••••••••">
                </div>
                
                <button type="submit" id="btnLogin" class="w-full flex justify-center items-center py-3 px-4 rounded-xl text-sm font-bold text-white bg-emerald-500 hover:bg-emerald-600 focus:ring-4 focus:ring-emerald-100 transition-all shadow-md shadow-emerald-500/20">
                    <span id="btnLoginText">Masuk Sekarang</span>
                    <i data-lucide="loader-2" id="btnLoginLoader" class="w-5 h-5 ml-2 animate-spin hidden"></i>
                </button>
            </form>

            <form id="forgotForm" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email atau No WhatsApp</label>
                    <input type="text" id="resetTarget" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="email@anda.com / 628123...">
                    <p class="text-[10px] text-slate-500 mt-1">Sistem akan mengirimkan password baru ke kontak Anda.</p>
                </div>
                
                <button type="submit" id="btnForgot" class="w-full flex justify-center items-center py-3 px-4 rounded-xl text-sm font-bold text-white bg-slate-900 hover:bg-slate-800 transition-all shadow-md">
                    <span id="btnForgotText">Reset & Kirim Password</span>
                    <i data-lucide="loader-2" id="btnForgotLoader" class="w-5 h-5 ml-2 animate-spin hidden"></i>
                </button>
                <div class="text-center">
                    <button type="button" onclick="toggleForm('login')" class="text-sm text-slate-500 hover:text-slate-700 font-medium transition-colors">&larr; Kembali ke Login</button>
                </div>
            </form>

        </div>
        
        <div class="bg-slate-50 border-t border-slate-100 p-5 text-center space-y-3">
            <div id="footerRegister">
                <p class="text-xs text-slate-500 mb-1">Belum punya toko?</p>
                <a href="index.html?register=true" onclick="window.location.href='index.html?register=true'; return false;" class="text-sm font-bold text-emerald-600 hover:text-emerald-700 cursor-pointer">Daftar Gratis Sekarang</a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // URL Web App Google Apps Script
        const SCRIPT_URL = 'URL WEB APP GOOGLE APPS SCRIPT ANDA MASUKAN DISINI';

        // ==========================================
        // FITUR PENGATURAN MODE (SINGLE STORE)
        // ==========================================
        function checkAppMode() {
            let fd = new FormData();
            fd.append('action', 'get_app_settings');
            
            fetch(SCRIPT_URL, { method: 'POST', body: fd })
                .then(res => res.json())
                .then(res => {
                    if (res.success && res.data && res.data.app_mode === 'single') {
                        // Jika Mode Single Store aktif, matikan form pendaftaran
                        const footerReg = document.getElementById('footerRegister');
                        if(footerReg) footerReg.classList.add('hidden');
                    }
                })
                .catch(err => console.log("Gagal memuat konfigurasi mode:", err));
        }

        // ==========================================
        // FITUR SMART LOGIN (Bunglon sesuai Toko)
        // ==========================================
        function loadStoreBranding() {
            const urlParams = new URLSearchParams(window.location.search);
            const storeSlug = urlParams.get('t');

            if (storeSlug) {
                // Ubah tombol back mengarah ke halaman etalase toko
                const backBtn = document.getElementById('backBtn');
                backBtn.href = `toko.html?t=${storeSlug}`;
                backBtn.setAttribute('onclick', `window.location.href='toko.html?t=${storeSlug}'; return false;`);
                document.getElementById('backBtnText').innerText = "Toko";

                // Ambil data dari backend untuk menyesuaikan Logo & Nama
                let fd = new FormData();
                fd.append('action', 'get_public_stores');
                
                fetch(SCRIPT_URL, { method: 'POST', body: fd })
                    .then(res => res.json())
                    .then(res => {
                        if (res.success) {
                            const store = res.data.find(s => s.slug === storeSlug);
                            if (store) {
                                // MENGUBAH TITLE TAB BROWSER SECARA DINAMIS
                                document.title = `Masuk - ${store.nama}`;

                                // Ganti Nama & Subtitle
                                document.getElementById('formTitle').innerText = `Masuk ke ${store.nama}`;
                                document.getElementById('formSubtitle').innerText = "Silakan login ke panel admin Anda";
                                
                                // Ganti Logo
                                if (store.logo) {
                                    const logoContainer = document.getElementById('brandLogoContainer');
                                    logoContainer.innerHTML = `<img src="${store.logo}" class="w-full h-full object-cover">`;
                                    logoContainer.classList.remove('bg-emerald-100', 'text-emerald-600');
                                    logoContainer.classList.add('bg-white', 'border', 'border-slate-200');
                                }

                                // Sembunyikan bagian daftar agar terlihat seperti web mandiri
                                const footerReg = document.getElementById('footerRegister');
                                if(footerReg) footerReg.classList.add('hidden');
                            }
                        }
                    })
                    .catch(err => console.error("Gagal memuat branding toko:", err));
            }
        }
        
        // Panggil saat halaman dimuat
        document.addEventListener('DOMContentLoaded', () => {
            checkAppMode();
            loadStoreBranding();
        });

        // ==========================================
        // Toggle Form Login vs Lupa Password
        // ==========================================
        function toggleForm(type) {
            const loginForm = document.getElementById('loginForm');
            const forgotForm = document.getElementById('forgotForm');
            const formTitle = document.getElementById('formTitle');
            const formSubtitle = document.getElementById('formSubtitle');
            const alertBox = document.getElementById('alertBox');
            
            alertBox.classList.add('hidden'); 
            
            const urlParams = new URLSearchParams(window.location.search);
            const isStoreLogin = urlParams.has('t');
            
            if (type === 'forgot') {
                document.title = "Lupa Password"; // Update title jadi Lupa Password
                loginForm.classList.add('hidden');
                forgotForm.classList.remove('hidden');
                formTitle.innerText = "Lupa Password";
                formSubtitle.innerText = "Masukkan info kontak untuk reset sandi";
            } else {
                forgotForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                
                if (isStoreLogin) {
                    loadStoreBranding(); // Otomatis nge-set title kembali ke nama toko
                } else {
                    document.title = "Masuk - Panel Admin"; // Netral
                    formTitle.innerText = "Masuk ke Akun";
                    formSubtitle.innerText = "Silakan masuk ke panel admin Anda";
                }
            }
        }

        // Tampilkan Notifikasi
        function showAlert(msg, isSuccess) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerText = msg;
            alertBox.className = `mb-6 p-3 rounded-lg text-sm font-medium text-center ${isSuccess ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200'}`;
            alertBox.classList.remove('hidden');
        }

        // ==========================================
        // PROSES LOGIN
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btnText = document.getElementById('btnLoginText');
            const btnLoader = document.getElementById('btnLoginLoader');
            const btnLogin = document.getElementById('btnLogin');
            
            btnLogin.disabled = true;
            btnText.innerText = "Memverifikasi...";
            btnLoader.classList.remove('hidden');
            document.getElementById('alertBox').classList.add('hidden');
            
            const formData = new FormData();
            formData.append('action', 'login');
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            fetch(SCRIPT_URL, { method: 'POST', body: formData })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        showAlert(res.message, true);
                        localStorage.setItem('iMersWA_User', JSON.stringify(res.data));
                        
                        setTimeout(() => { 
                            if (window.location.protocol !== 'blob:' && window.location.protocol !== 'data:' && window.self === window.top) {
                                window.location.href = 'dashboard.html'; 
                            } else {
                                showAlert("Login sukses! (Pindah ke dashboard.html jika di hosting asli)", true);
                                btnText.innerText = "Masuk Sekarang";
                                btnLoader.classList.add('hidden');
                            }
                        }, 1000);
                    } else {
                        showAlert(res.message, false);
                        btnLogin.disabled = false;
                        btnText.innerText = "Masuk Sekarang";
                        btnLoader.classList.add('hidden');
                    }
                })
                .catch(err => {
                    console.error("Login Error:", err);
                    showAlert("Terjadi kesalahan koneksi. Silakan coba lagi.", false);
                    btnLogin.disabled = false;
                    btnText.innerText = "Masuk Sekarang";
                    btnLoader.classList.add('hidden');
                });
        });

        // ==========================================
        // PROSES LUPA PASSWORD
        // ==========================================
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btnText = document.getElementById('btnForgotText');
            const btnLoader = document.getElementById('btnForgotLoader');
            const btnForgot = document.getElementById('btnForgot');
            const alertBox = document.getElementById('alertBox');
            
            btnForgot.disabled = true;
            btnText.innerText = "Memproses...";
            btnLoader.classList.remove('hidden');
            alertBox.classList.add('hidden');
            
            const formData = new FormData();
            formData.append('action', 'forgot_password');
            formData.append('email_or_wa', document.getElementById('resetTarget').value);

            fetch(SCRIPT_URL, { method: 'POST', body: formData })
                .then(res => res.json())
                .then(res => {
                    showAlert(res.message, res.success);
                    btnForgot.disabled = false;
                    btnText.innerText = "Reset & Kirim Password";
                    btnLoader.classList.add('hidden');
                    if(res.success) {
                        document.getElementById('forgotForm').reset();
                        setTimeout(() => toggleForm('login'), 3500);
                    }
                })
                .catch(err => {
                    console.error("Forgot Pass Error:", err);
                    showAlert("Terjadi kesalahan koneksi", false);
                    btnForgot.disabled = false;
                    btnText.innerText = "Reset & Kirim Password";
                    btnLoader.classList.add('hidden');
                });
        });
    </script>
</body>
</html>
